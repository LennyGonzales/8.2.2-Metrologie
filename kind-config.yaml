kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: gonzales-lenny-prometheus-grafana-elk
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraMounts:
      - hostPath: grafana
        containerPath: /grafana
        readOnly: true
      - hostPath: datasets
        containerPath: /datasets
        readOnly: true
    extraPortMappings:
      - containerPort: 30090
        hostPort: 9090
        protocol: TCP
      - containerPort: 30300
        hostPort: 3000
        protocol: TCP
      - containerPort: 30093
        hostPort: 9093
        protocol: TCP
      - containerPort: 30800
        hostPort: 8080
        protocol: TCP
      - containerPort: 30561
        hostPort: 5601
        protocol: TCP
