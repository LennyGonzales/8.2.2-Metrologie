input {
  file {
    path => "/datasets/Air_Quality.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    mode => "read"
    file_completed_action => "log"
    file_completed_log_path => "/tmp/air_quality_done.log"
  }
}

filter {
  if [message] =~ /^Unique ID/ {
    drop {}
  }

  csv {
    separator => ","
    columns => [
      "unique_id",
      "indicator_id",
      "name",
      "measure",
      "measure_info",
      "geo_type_name",
      "geo_join_id",
      "geo_place_name",
      "time_period",
      "start_date",
      "data_value",
      "message_field"
    ]
  }

  date {
    match => ["start_date", "MM/dd/yyyy"]
    target => "@timestamp"
  }

  mutate {
    convert => {
      "unique_id" => "integer"
      "indicator_id" => "integer"
      "geo_join_id" => "integer"
      "data_value" => "float"
    }
    rename => {
      "name" => "pollutant"
    }
    remove_field => ["message", "message_field", "host", "log", "event"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch.elastic.svc.cluster.local:9200"]
    index => "air-quality-%{+YYYY.MM}"
    action => "index"
  }

  stdout {
    codec => dots
  }
}
